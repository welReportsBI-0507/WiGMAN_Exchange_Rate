name: RBI Exchange Rate

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright pandas lxml html5lib openpyxl
          python -m playwright install --with-deps

      - name: Run script
        run: python rate.py

      - name: Commit updated file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add "Exchange Rate.xlsx"
          git commit -m "Update RBI rates" || echo "No changes"
          git push
